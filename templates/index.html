<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>twitter-ero-video-ranking-downloader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 24px;
      color: #1f2937;
    }
    .container {
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .field {
      display: flex;
      flex-direction: column;
    }
    .field.full {
      grid-column: 1 / -1;
    }
    label {
      font-size: 14px;
      margin-bottom: 6px;
      color: #374151;
    }
    input {
      height: 36px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
    }
    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      background: #2563eb;
      color: #fff;
      border-radius: 6px;
      height: 36px;
      padding: 0 14px;
      cursor: pointer;
    }
    button.secondary {
      background: #4b5563;
    }
    button:hover {
      opacity: 0.9;
    }
    .status {
      margin-top: 18px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.7;
    }
    .logs {
      margin-top: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: Consolas, monospace;
      font-size: 12px;
      height: 280px;
      overflow: auto;
      padding: 10px;
      white-space: pre-wrap;
    }
    .note {
      margin-top: 8px;
      color: #6b7280;
      font-size: 12px;
    }
    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>twitter-ero-video-ranking-downloader</h1>

    <form method="post" action="/save">
      <div class="grid">
        <div class="field full">
          <label for="download_root">视频下载根目录</label>
          <input id="download_root" name="download_root" type="text" required value="{{ config.download_root }}" />
        </div>

        <div class="field full">
          <label for="proxy">HTTP/HTTPS 代理（可空）</label>
          <input id="proxy" name="proxy" type="text" placeholder="例如：http://127.0.0.1:7890" value="{{ config.proxy }}" />
        </div>

        <div class="field">
          <label for="schedule_time">每日定时执行时间（HH:MM）</label>
          <input id="schedule_time" name="schedule_time" type="time" required value="{{ config.schedule_time }}" />
        </div>

        <div class="field">
          <label for="max_daily_downloads">每日最大下载数量</label>
          <input id="max_daily_downloads" name="max_daily_downloads" type="number" min="1" required value="{{ config.max_daily_downloads }}" />
        </div>
      </div>

      <div class="actions">
        <button type="submit">保存配置</button>
        <button type="button" class="secondary" onclick="runNow()">立即执行任务</button>
        <button type="button" class="secondary" onclick="refreshStatus()">刷新状态</button>
      </div>
    </form>

    <div class="status">
      <div>运行中：<span id="is_running">{{ "是" if state.is_running else "否" }}</span></div>
      <div>最近执行时间：<span id="last_run_time">{{ state.last_run_time or "暂无" }}</span></div>
      <div>最近结果：<span id="last_result">{{ state.last_result }}</span></div>
      <div class="note">日志每 5 秒自动刷新一次。</div>
    </div>

    <div id="logs" class="logs">{{ logs }}</div>
  </div>

  <script>
    async function runNow() {
      const resp = await fetch('/run-now', { method: 'POST' });
      const data = await resp.json();
      if (!data.ok) {
        alert(data.message || '启动失败');
      }
      refreshStatus();
    }

    async function refreshStatus() {
      const resp = await fetch('/status');
      const data = await resp.json();
      if (!data.ok) {
        return;
      }

      document.getElementById('is_running').innerText = data.state.is_running ? '是' : '否';
      document.getElementById('last_run_time').innerText = data.state.last_run_time || '暂无';
      document.getElementById('last_result').innerText = data.state.last_result || '';
      document.getElementById('logs').innerText = (data.logs || []).join('\n');
    }

    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>
