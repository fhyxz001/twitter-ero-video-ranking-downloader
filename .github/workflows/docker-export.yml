name: Build and Export Offline Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: build
        run: |
          # Use the repository name as image name, lowercase
          IMAGE_NAME="twitter-ero-video-ranking-downloader"
          TAG="latest"
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          fi
          FULL_IMAGE_NAME="${IMAGE_NAME}:${TAG}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "FULL_IMAGE_NAME=${FULL_IMAGE_NAME}" >> $GITHUB_ENV
          docker build -t ${FULL_IMAGE_NAME} .

      - name: Save Docker image to tarball
        run: |
          docker save ${FULL_IMAGE_NAME} -o ${IMAGE_NAME}-${TAG}-offline.tar

      - name: Compress Docker image tarball
        run: |
          gzip ${IMAGE_NAME}-${TAG}-offline.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ env.TAG }}-offline
          path: ${{ env.IMAGE_NAME }}-${{ env.TAG }}-offline.tar.gz
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_NAME }}-${{ env.TAG }}-offline.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
